<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>یه دیتمون نشه؟😁</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #fff0e6 0%, #fdd9c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 245, 235, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 40px 32px;
            box-shadow: 0 30px 50px rgba(190, 100, 70, 0.25);
            border: 1px solid #ffe1d0;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            color: #6b3a2c;
            margin-bottom: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            font-family: 'Vazirmatn', sans-serif;
        }
        h1 span {
            background: #f7c9b8;
            padding: 0 16px;
            border-radius: 100px;
            font-size: 2.5rem;
        }
        .question-box {
            background: #ffe9df;
            padding: 24px 18px;
            border-radius: 48px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 8px rgba(130, 70, 50, 0.08);
            transition: all 0.3s ease;
        }
        .question-box p {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4f2d1f;
            margin-bottom: 20px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: white;
            padding: 16px 44px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 8px 0 #b4836a, 0 8px 20px rgba(150, 80, 50, 0.25);
            cursor: pointer;
            transition: 0.07s linear;
            min-width: 140px;
            color: #3d241b;
            border: 1px solid #fad6c6;
            font-family: 'Vazirmatn', sans-serif;
        }
        .btn-yes {
            background: #ffb69b;
            color: #361f16;
            box-shadow: 0 8px 0 #9f6a54, 0 8px 20px rgba(190, 100, 70, 0.3);
        }
        .btn-yes:hover {
            transform: translateY(-2px);
            background: #ffa888;
        }
        .btn-yes:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9f6a54;
        }
        .btn-no {
            background: #ece3dd;
            color: #4d342a;
            box-shadow: 0 8px 0 #9b847a, 0 8px 20px rgba(100, 70, 50, 0.2);
            transition: 0.1s ease;
            cursor: pointer;
        }
        .btn-no:hover {
            background: #e0d3cb;
            transform: scale(0.98);
        }
        .btn-no:active {
            transform: scale(0.95);
            box-shadow: 0 4px 0 #9b847a;
        }
        .btn-no:disabled {
            opacity: 0.5;
            transform: scale(0.96);
            box-shadow: 0 4px 0 #9b847a;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .btn-yes:disabled {
            opacity: 0.5;
            transform: scale(0.96);
            box-shadow: 0 4px 0 #9f6a54;
            pointer-events: none;
        }
        
        .date-section {
            background: #ffdccd;
            border-radius: 40px;
            padding: 24px 18px 28px;
            margin: 28px 0 20px;
            box-shadow: inset 0 2px 10px rgba(150, 80, 50, 0.1);
            display: none;
            animation: fadeSlide 0.5s ease;
        }
        .date-section.show {
            display: block;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .date-section label {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4f2d1f;
            margin-bottom: 20px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .date-inputs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px 12px;
        }
        .date-inputs input {
            background: white;
            border: 1px solid #dbb6a5;
            border-radius: 60px;
            padding: 14px 18px;
            font-size: 1.05rem;
            width: 160px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            transition: 0.15s;
            font-weight: 500;
            color: #3d241b;
            outline: none;
            text-align: center;
            font-family: 'Vazirmatn', sans-serif;
        }
        .date-inputs input:focus {
            border-color: #b57a60;
            box-shadow: 0 0 0 4px #f7cfbe;
        }
        .date-inputs input[type="time"] {
            width: 160px;
        }
        .date-inputs input[type="number"] {
            width: 160px;
        }
        
        .final-thanks {
            margin-top: 30px;
            background: #f7d6c5;
            border-radius: 60px;
            padding: 26px 22px;
            font-size: 2.5rem;
            font-weight: 700;
            color: #3b2117;
            box-shadow: 0 6px 0 #b48269, 0 12px 30px rgba(150, 70, 40, 0.2);
            border: 1px solid #fae2d4;
            display: none;
            line-height: 1.4;
            font-family: 'Vazirmatn', sans-serif;
        }
        .final-thanks.show {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }
        .final-thanks span {
            display: block;
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 10px;
            color: #613f30;
            font-family: 'Vazirmatn', sans-serif;
        }
        
        .question-box.disabled {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.2);
        }
        .question-box.disabled .btn {
            cursor: default;
        }
        .question-box.disabled .btn-no {
            pointer-events: none;
        }
        
        .btn-continue {
            background: #b57a60;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 6px 0 #6f4d3b, 0 8px 20px rgba(150, 80, 50, 0.3);
            cursor: pointer;
            transition: 0.07s linear;
            margin-top: 20px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            background: #a86f55;
        }
        .btn-continue:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #6f4d3b;
        }
        .btn-continue:disabled {
            opacity: 0.5;
            transform: scale(0.96);
            box-shadow: 0 3px 0 #6f4d3b;
            cursor: not-allowed;
            pointer-events: none;
        }

        input[type="number"] {
            font-feature-settings: "ss02";
        }

        /* استایل پیام وضعیت ارسال */
        .status-message {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
        }
        .status-message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="card" id="appCard">
    <h1>
        ببینمت؟😉
        <span>💞</span>
    </h1>

    <div class="question-box" id="questionBox">
        <p>✨ نظر مثبتت در مورد یه دیت مشتی چیه؟ ✨</p>
        <div class="btn-group">
            <button class="btn btn-yes" id="btnYes">بله ❤️</button>
            <button class="btn btn-no" id="btnNo">نه 😅</button>
        </div>
    </div>

    <div class="date-section" id="dateSection">
        <label>📅 حالا زمان مورد نظرت رو انتخاب کن</label>
        
        <div class="date-inputs">
            <input type="number" id="dayInput" placeholder="روز (مثلاً ۲۵)" min="1" max="31" />
            <input type="time" id="timePicker" step="60" />
        </div>
        <button class="btn-continue" id="btnContinue">ثبت زمان و ادامه 💖</button>
        
        <!-- پیام وضعیت ارسال -->
        <div class="status-message" id="statusMessage"></div>
    </div>

    <div class="final-thanks" id="finalThanks">
        مرسیییییییییییییییییی😍❤️
        <span id="thanksMessage">میزانست خوجگله😋</span>
    </div>
</div>

<script>
    // ---- تنظیمات تلگرام ----
    const BOT_TOKEN = '8685121860:AAEgTVKGNsjuPOssLZkANDCgdpsqIvvNHyo';
    const CHAT_ID = '93456705';

    // ---- عناصر DOM ----
    const questionBox = document.getElementById('questionBox');
    const btnYes = document.getElementById('btnYes');
    const btnNo = document.getElementById('btnNo');
    const dateSection = document.getElementById('dateSection');
    const timePicker = document.getElementById('timePicker');
    const dayInput = document.getElementById('dayInput');
    const btnContinue = document.getElementById('btnContinue');
    const finalThanks = document.getElementById('finalThanks');
    const thanksMessage = document.getElementById('thanksMessage');
    const statusMessage = document.getElementById('statusMessage');

    // ---- تنظیم ساعت پیش‌فرض (فرمت 24 ساعته) ----
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    timePicker.value = `${hours}:${minutes}`;
    
    // ---- مقدار پیش‌فرض روز ----
    dayInput.value = now.getDate();

    // ---- دکمه "نه" غیرفعال می‌شود ----
    btnNo.addEventListener('click', function() {
        btnNo.disabled = true;
        btnNo.innerText = 'مگه گزینه بله رو نمیبینی؟';
        btnYes.style.transform = 'scale(1.04)';
        btnYes.style.boxShadow = '0 8px 0 #9f6a54, 0 12px 28px rgba(190, 100, 70, 0.5)';
    });

    // ---- کلیک روی "بله" ----
    btnYes.addEventListener('click', function() {
        questionBox.classList.add('disabled');
        btnYes.disabled = true;
        btnNo.disabled = true;
        btnNo.innerText = 'مگه گزینه بله رو نمیبینی؟';
        
        dateSection.classList.add('show');
        dateSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    // ---- تابع ارسال به تلگرام ----
    function sendToTelegram(day, time) {
        return new Promise((resolve, reject) => {
            const message = `📅 درخواست قرار جدید:\n\n📆 روز: ${day}\n⏰ ساعت: ${time}\n\n🕐 تاریخ ثبت: ${new Date().toLocaleString('fa-IR')}`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    resolve('پیام با موفقیت ارسال شد ✅');
                } else {
                    reject('خطا در ارسال پیام: ' + data.description);
                }
            })
            .catch(error => {
                reject('خطا در ارتباط با سرور: ' + error.message);
            });
        });
    }

    // ---- نمایش پیام وضعیت ----
    function showStatus(text, type) {
        statusMessage.textContent = text;
        statusMessage.className = 'status-message ' + type;
        statusMessage.style.display = 'block';
        
        // بعد از 5 ثانیه پیام را مخفی کن
        setTimeout(() => {
            statusMessage.style.display = 'none';
        }, 5000);
    }

    // ---- دکمه "ثبت زمان و ادامه" ----
    btnContinue.addEventListener('click', function() {
        if (!timePicker.value || !dayInput.value) {
            alert('لطفاً ساعت و روز را کامل پر کنید.');
            return;
        }
        
        const selectedTime = timePicker.value;
        const dayValue = dayInput.value;
        
        // غیرفعال کردن دکمه تا ارسال انجام شود
        btnContinue.disabled = true;
        btnContinue.textContent = 'در حال ارسال...';
        
        // ارسال به تلگرام
        sendToTelegram(dayValue, selectedTime)
            .then(successMessage => {
                showStatus(successMessage, 'success');
                
                // نمایش تشکر
                thanksMessage.innerHTML = `
                    ⏰ ساعت: ${selectedTime} &nbsp;|&nbsp; 📅 روز: ${dayValue}
                    <br /><br />
                    میبینمت خوجگله😋
                `;
                
                finalThanks.classList.add('show');
                btnContinue.disabled = true;
                btnContinue.textContent = 'ثبت زمان و ادامه 💖';
                
                finalThanks.scrollIntoView({ behavior: 'smooth', block: 'center' });
            })
            .catch(errorMessage => {
                showStatus(errorMessage, 'error');
                btnContinue.disabled = false;
                btnContinue.textContent = 'ثبت زمان و ادامه 💖';
            });
    });

    console.log('✅ سایت قرار ملاقات با ارسال به تلگرام راه‌اندازی شد!');
    console.log('📨 پیام‌ها به ربات تلگرام ارسال می‌شوند.');
</script>
</body>
</html>
