<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>یه دیتمون نشه؟😁</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #fff0e6 0%, #fdd9c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 245, 235, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 40px 32px;
            box-shadow: 0 30px 50px rgba(190, 100, 70, 0.25);
            border: 1px solid #ffe1d0;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            color: #6b3a2c;
            margin-bottom: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            font-family: 'Vazirmatn', sans-serif;
        }
        h1 span {
            background: #f7c9b8;
            padding: 0 16px;
            border-radius: 100px;
            font-size: 2.5rem;
        }
        .question-box {
            background: #ffe9df;
            padding: 24px 18px;
            border-radius: 48px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 8px rgba(130, 70, 50, 0.08);
            transition: all 0.3s ease;
        }
        .question-box p {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4f2d1f;
            margin-bottom: 20px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: white;
            padding: 16px 44px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 8px 0 #b4836a, 0 8px 20px rgba(150, 80, 50, 0.25);
            cursor: pointer;
            transition: 0.07s linear;
            min-width: 140px;
            color: #3d241b;
            border: 1px solid #fad6c6;
            font-family: 'Vazirmatn', sans-serif;
        }
        .btn-yes {
            background: #ffb69b;
            color: #361f16;
            box-shadow: 0 8px 0 #9f6a54, 0 8px 20px rgba(190, 100, 70, 0.3);
        }
        .btn-yes:hover {
            transform: translateY(-2px);
            background: #ffa888;
        }
        .btn-yes:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9f6a54;
        }
        .btn-no {
            background: #ece3dd;
            color: #4d342a;
            box-shadow: 0 8px 0 #9b847a, 0 8px 20px rgba(100, 70, 50, 0.2);
            transition: 0.1s ease;
            cursor: pointer;
        }
        .btn-no:hover {
            background: #e0d3cb;
            transform: scale(0.98);
        }
        .btn-no:active {
            transform: scale(0.95);
            box-shadow: 0 4px 0 #9b847a;
        }
        .btn-no:disabled {
            opacity: 0.5;
            transform: scale(0.96);
            box-shadow: 0 4px 0 #9b847a;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .btn-yes:disabled {
            opacity: 0.5;
            transform: scale(0.96);
            box-shadow: 0 4px 0 #9f6a54;
            pointer-events: none;
        }
        
        .date-section {
            background: #ffdccd;
            border-radius: 40px;
            padding: 24px 18px 28px;
            margin: 28px 0 20px;
            box-shadow: inset 0 2px 10px rgba(150, 80, 50, 0.1);
            display: none;
            animation: fadeSlide 0.5s ease;
        }
        .date-section.show {
            display: block;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .date-section label {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4f2d1f;
            margin-bottom: 20px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .date-inputs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px 12px;
        }
        .date-inputs input {
            background: white;
            border: 1px solid #dbb6a5;
            border-radius: 60px;
            padding: 14px 18px;
            font-size: 1.05rem;
            width: 160px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            transition: 0.15s;
            font-weight: 500;
            color: #3d241b;
            outline: none;
            text-align: center;
            font-family: 'Vazirmatn', sans-serif;
        }
        .date-inputs input:focus {
            border-color: #b57a60;
            box-shadow: 0 0 0 4px #f7cfbe;
        }
        .date-inputs input[type="time"] {
            width: 160px;
        }
        .date-inputs input[type="number"] {
            width: 160px;
        }
        .date-inputs input[type="text"] {
            width: 200px;
        }

        /* بخش پیام و اسم کاربر */
        .user-message-section {
            background: #ffdccd;
            border-radius: 40px;
            padding: 24px 18px 28px;
            margin: 28px 0 20px;
            box-shadow: inset 0 2px 10px rgba(150, 80, 50, 0.1);
            display: none;
            animation: fadeSlide 0.5s ease;
        }
        .user-message-section.show {
            display: block;
        }
        .user-message-section label {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4f2d1f;
            margin-bottom: 15px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .user-message-section textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            border: 2px solid #dbb6a5;
            font-size: 1rem;
            font-family: 'Vazirmatn', sans-serif;
            resize: vertical;
            min-height: 80px;
            background: white;
            outline: none;
            transition: 0.15s;
            color: #3d241b;
        }
        .user-message-section textarea:focus {
            border-color: #b57a60;
            box-shadow: 0 0 0 4px #f7cfbe;
        }
        .user-message-section .input-group {
            margin-top: 12px;
        }
        .user-message-section .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 2px solid #dbb6a5;
            font-size: 1rem;
            font-family: 'Vazirmatn', sans-serif;
            background: white;
            outline: none;
            transition: 0.15s;
            color: #3d241b;
            text-align: center;
        }
        .user-message-section .input-group input:focus {
            border-color: #b57a60;
            box-shadow: 0 0 0 4px #f7cfbe;
        }
        
        .final-thanks {
            margin-top: 30px;
            background: #f7d6c5;
            border-radius: 60px;
            padding: 26px 22px;
            font-size: 2.5rem;
            font-weight: 700;
            color: #3b2117;
            box-shadow: 0 6px 0 #b48269, 0 12px 30px rgba(150, 70, 40, 0.2);
            border: 1px solid #fae2d4;
            display: none;
            line-height: 1.4;
            font-family: 'Vazirmatn', sans-serif;
        }
        .final-thanks.show {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }
        .final-thanks span {
            display: block;
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 10px;
            color: #613f30;
            font-family: 'Vazirmatn', sans-serif;
        }
        
        .question-box.disabled {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.2);
        }
        .question-box.disabled .btn {
            cursor: default;
        }
        .question-box.disabled .btn-no {
            pointer-events: none;
        }
        
        .btn-continue {
            background: #b57a60;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 6px 0 #6f4d3b, 0 8px 20px rgba(150, 80, 50, 0.3);
            cursor: pointer;
            transition: 0.07s linear;
            margin-top: 20px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            background: #a86f55;
        }
        .btn-continue:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #6f4d3b;
        }
        .btn-continue:disabled {
            opacity: 0.5;
            transform: scale(0.96);
            box-shadow: 0 3px 0 #6f4d3b;
            cursor: not-allowed;
            pointer-events: none;
        }

        input[type="number"] {
            font-feature-settings: "ss02";
        }

        .status-message {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
        }
        .status-message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* دکمه اسکیپ برای رد کردن بخش پیام */
        .btn-skip {
            background: transparent;
            color: #8f5e4b;
            border: 2px solid #dbb6a5;
            padding: 10px 30px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 12px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .btn-skip:hover {
            background: #dbb6a5;
            color: white;
        }
    </style>
</head>
<body>

<div class="card" id="appCard">
    <h1>
        ببینمت؟😉
        <span>💞</span>
    </h1>

    <div class="question-box" id="questionBox">
        <p>✨ نظر مثبتت در مورد یه دیت مشتی چیه؟ ✨</p>
        <div class="btn-group">
            <button class="btn btn-yes" id="btnYes">بله ❤️</button>
            <button class="btn btn-no" id="btnNo">نه 😅</button>
        </div>
    </div>

    <div class="date-section" id="dateSection">
        <label>📅 حالا زمان مورد نظرت رو انتخاب کن</label>
        
        <div class="date-inputs">
            <input type="number" id="dayInput" placeholder="روز (مثلاً ۲۵)" min="1" max="31" />
            <input type="time" id="timePicker" step="60" />
        </div>
        <button class="btn-continue" id="btnContinueDate">ثبت زمان و ادامه 💖</button>
    </div>

    <!-- بخش پیام و اسم کاربر -->
    <div class="user-message-section" id="userMessageSection">
        <label>💬 هر چی دوست داری بهم بگو (اختیاری)</label>
        
        <div class="input-group">
            <input type="text" id="userNameInput" placeholder="اسمت رو بنویس (اختیاری)" />
        </div>
        <div class="input-group" style="margin-top: 12px;">
            <textarea id="userMessageInput" placeholder="پیامت رو برام بنویس... (اختیاری)"></textarea>
        </div>
        
        <div style="margin-top: 15px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <button class="btn-continue" id="btnSendMessage">ارسال و تمام ❤️</button>
            <button class="btn-skip" id="btnSkipMessage">رد کردن 🚀</button>
        </div>
        
        <div class="status-message" id="statusMessage"></div>
    </div>

    <div class="final-thanks" id="finalThanks">
        مرسیییییییییییییییییی😍❤️
        <span id="thanksMessage">میزانست خوجگله😋</span>
    </div>
</div>

<script>
    // ---- تنظیمات تلگرام ----
    const BOT_TOKEN = '8685121860:AAEgTVKGNsjuPOssLZkANDCgdpsqIvvNHyo';
    const CHAT_ID = '93456705';

    // ---- عناصر DOM ----
    const questionBox = document.getElementById('questionBox');
    const btnYes = document.getElementById('btnYes');
    const btnNo = document.getElementById('btnNo');
    const dateSection = document.getElementById('dateSection');
    const timePicker = document.getElementById('timePicker');
    const dayInput = document.getElementById('dayInput');
    const btnContinueDate = document.getElementById('btnContinueDate');
    const userMessageSection = document.getElementById('userMessageSection');
    const userNameInput = document.getElementById('userNameInput');
    const userMessageInput = document.getElementById('userMessageInput');
    const btnSendMessage = document.getElementById('btnSendMessage');
    const btnSkipMessage = document.getElementById('btnSkipMessage');
    const finalThanks = document.getElementById('finalThanks');
    const thanksMessage = document.getElementById('thanksMessage');
    const statusMessage = document.getElementById('statusMessage');

    // ---- دریافت مدل گوشی ----
    function getDeviceModel() {
        const ua = navigator.userAgent;
        let model = 'ناشناخته';
        
        // تشخیص مدل گوشی از User Agent
        if (/iPhone/.test(ua)) {
            const match = ua.match(/iPhone (?:OS )?(\d+_\d+)/);
            model = match ? `iPhone ${match[1].replace('_', '.')}` : 'iPhone';
        } else if (/Android/.test(ua)) {
            const match = ua.match(/Android\s([\d.]+)/);
            const brand = ua.match(/; ([\w\s]+) Build/) || ua.match(/; ([\w\s]+)\)/);
            model = brand ? `${brand[1].trim()}` : 'Android';
            if (match) model += ` (Android ${match[1]})`;
        } else if (/iPad/.test(ua)) {
            model = 'iPad';
        } else if (/Windows Phone/.test(ua)) {
            model = 'Windows Phone';
        } else {
            // تشخیص برند از طریق other methods
            const brands = ['Samsung', 'Xiaomi', 'Huawei', 'Nokia', 'LG', 'Sony', 'HTC', 'Google', 'OnePlus'];
            for (let brand of brands) {
                if (ua.includes(brand)) {
                    model = brand;
                    break;
                }
            }
        }
        
        // تشخیص مرورگر
        let browser = 'ناشناخته';
        if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
        else if (ua.includes('Edge')) browser = 'Edge';
        else if (ua.includes('Opera') || ua.includes('OPR')) browser = 'Opera';
        
        return `${model} (${browser})`;
    }

    // ---- تابع ارسال به تلگرام با اطلاعات کامل ----
    function sendToTelegram(day, time, name, message, device) {
        return new Promise((resolve, reject) => {
            let text = `📅 درخواست قرار جدید:\n\n`;
            text += `📆 روز: ${day}\n`;
            text += `⏰ ساعت: ${time}\n`;
            text += `📱 مدل گوشی: ${device}\n`;
            if (name) text += `👤 اسم: ${name}\n`;
            if (message) text += `💬 پیام: ${message}\n`;
            text += `\n🕐 تاریخ ثبت: ${new Date().toLocaleString('fa-IR')}`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    resolve('پیام با موفقیت ارسال شد ✅');
                } else {
                    reject('خطا در ارسال پیام: ' + data.description);
                }
            })
            .catch(error => {
                reject('خطا در ارتباط با سرور: ' + error.message);
            });
        });
    }

    // ---- نمایش پیام وضعیت ----
    function showStatus(text, type) {
        statusMessage.textContent = text;
        statusMessage.className = 'status-message ' + type;
        statusMessage.style.display = 'block';
        
        setTimeout(() => {
            statusMessage.style.display = 'none';
        }, 5000);
    }

    // ---- ذخیره اطلاعات موقت ----
    let tempDay = '';
    let tempTime = '';

    // ---- دکمه "نه" غیرفعال می‌شود ----
    btnNo.addEventListener('click', function() {
        btnNo.disabled = true;
        btnNo.innerText = 'مگه گزینه بله رو نمیبینی؟';
        btnYes.style.transform = 'scale(1.04)';
        btnYes.style.boxShadow = '0 8px 0 #9f6a54, 0 12px 28px rgba(190, 100, 70, 0.5)';
    });

    // ---- کلیک روی "بله" ----
    btnYes.addEventListener('click', function() {
        questionBox.classList.add('disabled');
        btnYes.disabled = true;
        btnNo.disabled = true;
        btnNo.innerText = 'مگه گزینه بله رو نمیبینی؟';
        
        dateSection.classList.add('show');
        dateSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    // ---- دکمه "ثبت زمان و ادامه" ----
    btnContinueDate.addEventListener('click', function() {
        if (!timePicker.value || !dayInput.value) {
            alert('لطفاً ساعت و روز را کامل پر کنید.');
            return;
        }
        
        tempDay = dayInput.value;
        tempTime = timePicker.value;
        
        // مخفی کردن بخش تاریخ و نمایش بخش پیام
        dateSection.classList.remove('show');
        userMessageSection.classList.add('show');
        userMessageSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    // ---- ارسال نهایی با پیام و اسم ----
    function finalSubmit(name, message) {
        const device = getDeviceModel();
        
        btnSendMessage.disabled = true;
        btnSendMessage.textContent = 'در حال ارسال...';
        btnSkipMessage.disabled = true;
        
        sendToTelegram(tempDay, tempTime, name, message, device)
            .then(successMessage => {
                showStatus(successMessage, 'success');
                
                thanksMessage.innerHTML = `
                    ⏰ ساعت: ${tempTime} &nbsp;|&nbsp; 📅 روز: ${tempDay}
                    ${name ? `<br />👤 ${name}` : ''}
                    <br /><br />
                    میبینمت خوجگله😋
                `;
                
                finalThanks.classList.add('show');
                btnSendMessage.disabled = true;
                btnSendMessage.textContent = 'ارسال و تمام ❤️';
                btnSkipMessage.disabled = true;
                
                // مخفی کردن بخش پیام
                userMessageSection.classList.remove('show');
                
                finalThanks.scrollIntoView({ behavior: 'smooth', block: 'center' });
            })
            .catch(errorMessage => {
                showStatus(errorMessage, 'error');
                btnSendMessage.disabled = false;
                btnSendMessage.textContent = 'ارسال و تمام ❤️';
                btnSkipMessage.disabled = false;
            });
    }

    // ---- دکمه ارسال پیام ----
    btnSendMessage.addEventListener('click', function() {
        const name = userNameInput.value.trim();
        const message = userMessageInput.value.trim();
        finalSubmit(name, message);
    });

    // ---- دکمه رد کردن (بدون پیام) ----
    btnSkipMessage.addEventListener('click', function() {
        finalSubmit('', '');
    });

    // ---- تنظیمات اولیه ----
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    timePicker.value = `${hours}:${minutes}`;
    dayInput.value = now.getDate();

    console.log('✅ سایت قرار ملاقات با ارسال به تلگرام و قابلیت پیام و تشخیص گوشی راه‌اندازی شد!');
    console.log('📨 پیام‌ها به ربات تلگرام ارسال می‌شوند.');
</script>
</body>
</html>
